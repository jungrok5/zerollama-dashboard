<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>zerollama-dashboard</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-2: #161b22;
    --bg-3: #1f242c;
    --fg: #e6edf3;
    --fg-dim: #9aa4b2;
    --fg-mute: #6b7785;
    --border: #30363d;
    --accent: #58a6ff;
    --accent-2: #79c0ff;
    --good: #3fb950;
    --warn: #d29922;
    --bad: #f85149;
    --info: #58a6ff;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    --shadow: 0 1px 0 #ffffff08 inset, 0 0 0 1px var(--border);
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, "Noto Sans", "Noto Sans CJK KR",
          "Noto Sans CJK JP", "Noto Sans CJK SC", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); }
  code, pre, kbd { font-family: var(--mono); }
  button {
    font: inherit; color: inherit;
    background: var(--bg-3); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 10px; cursor: pointer;
  }
  button:hover { background: #232a33; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  select, input {
    font: inherit; color: inherit;
    background: var(--bg-3); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 8px;
  }
  /* layout */
  header.app {
    display: flex; gap: 12px; align-items: center;
    padding: 10px 14px; background: var(--bg-2);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
    flex-wrap: wrap;
  }
  header.app .brand { font-weight: 600; letter-spacing: 0.2px; }
  header.app .brand .dot { color: var(--accent); }
  header.app .grow { flex: 1; }
  header.app .server {
    font-family: var(--mono); color: var(--fg-dim);
    background: var(--bg-3); padding: 2px 8px; border-radius: 6px;
    border: 1px solid var(--border);
    max-width: 320px; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap;
  }
  .led {
    display: inline-block; width: 10px; height: 10px;
    border-radius: 50%; background: var(--fg-mute); vertical-align: middle;
    box-shadow: 0 0 0 0 #0000;
    transition: background 0.2s, box-shadow 0.4s;
  }
  .led.on    { background: var(--good); box-shadow: 0 0 8px #3fb95066; }
  .led.warn  { background: var(--warn); box-shadow: 0 0 8px #d2992266; }
  .led.bad   { background: var(--bad);  box-shadow: 0 0 8px #f8514966; }
  .status-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 2px 8px; border-radius: 999px;
    background: var(--bg-3); border: 1px solid var(--border);
    color: var(--fg-dim); font-size: 12px;
  }
  main {
    padding: 14px;
    display: grid; gap: 14px;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    align-items: start;
  }
  .full { grid-column: 1 / -1; }
  .card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex; flex-direction: column; gap: 8px;
    min-width: 0;
  }
  .card h2 {
    margin: 0; font-size: 12px; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--fg-dim); font-weight: 600;
  }
  .card .value {
    font-size: 28px; font-weight: 600; font-family: var(--mono);
    color: var(--fg); line-height: 1.1;
  }
  .card .sub { font-size: 12px; color: var(--fg-dim); }
  .banner {
    background: #2d1517; border: 1px solid #5e2329; color: #ffb4ac;
    padding: 8px 12px; border-radius: 8px; margin: 10px 14px 0;
    font-size: 13px;
  }
  .banner.warn { background: #2b240b; border-color: #5a4a14; color: #f0d77b; }
  .empty-hint {
    color: var(--fg-mute); font-size: 12px; padding: 12px 14px;
  }
  /* metrics */
  .metric-card .row {
    display: flex; align-items: baseline; gap: 8px;
    flex-wrap: wrap;
  }
  .metric-card .unit { color: var(--fg-mute); font-size: 13px; font-family: var(--mono); }
  .metric-card svg { width: 100%; height: 36px; display: block; }
  .metric-card .spark-area  { fill: #58a6ff22; }
  .metric-card .spark-line  { fill: none; stroke: var(--accent); stroke-width: 1.5; }
  .metric-card .spark-grid  { stroke: var(--border); stroke-width: 1; }
  .metric-card.warn .value  { color: var(--warn); }
  .metric-card.bad  .value  { color: var(--bad); }
  .metric-card.warn .spark-line { stroke: var(--warn); }
  .metric-card.warn .spark-area { fill: #d2992233; }
  .metric-card.bad  .spark-line { stroke: var(--bad); }
  .metric-card.bad  .spark-area { fill: #f8514933; }
  .metric-card.disabled .value { color: var(--fg-mute); }
  .pct-bar {
    height: 6px; background: var(--bg-3);
    border-radius: 3px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .pct-bar > span { display: block; height: 100%; background: var(--accent); transition: width 0.2s; }
  .pct-bar.warn > span { background: var(--warn); }
  .pct-bar.bad  > span { background: var(--bad); }
  /* slots */
  .slot-grid {
    display: grid; gap: 10px;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  }
  .slot {
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 12px;
    display: flex; flex-direction: column; gap: 6px;
    min-width: 0;
  }
  .slot.idle { opacity: 0.7; }
  .slot.active { border-color: #2f6db1; box-shadow: 0 0 0 1px #2f6db166 inset; }
  .slot-head {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 13px;
  }
  .slot-head .id { color: var(--fg-dim); }
  .slot-head .badge {
    font-size: 11px; padding: 1px 6px; border-radius: 999px;
    background: var(--bg-3); color: var(--fg-dim);
    border: 1px solid var(--border);
  }
  .slot-head .badge.active { background: #1d3a5c; color: #9cc3ff; border-color: #2f6db1; }
  .slot-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .slot-actions button { font-size: 11px; padding: 2px 8px; }
  .slot .progress {
    display: grid; grid-template-columns: 1fr auto;
    gap: 8px; align-items: center;
    font-family: var(--mono); font-size: 12px; color: var(--fg-dim);
  }
  .slot .params {
    margin-top: 4px;
    background: var(--bg-3); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 8px;
    font-family: var(--mono); font-size: 11.5px; color: var(--fg-dim);
    display: grid; grid-template-columns: max-content 1fr;
    gap: 2px 10px; max-height: 40vh; overflow: auto;
  }
  .slot .params .k { color: var(--fg-mute); }
  .slot .params .v { color: var(--fg); word-break: break-all; }
  .slot details > summary {
    cursor: pointer; color: var(--accent); font-size: 12px;
    list-style: none; user-select: none;
  }
  .slot details > summary::-webkit-details-marker { display: none; }
  .slot details > summary::before { content: "▸ "; }
  .slot details[open] > summary::before { content: "▾ "; }
  /* models / config */
  .kv-table {
    display: grid; grid-template-columns: max-content 1fr;
    gap: 4px 12px; font-family: var(--mono); font-size: 12px;
  }
  .kv-table .k { color: var(--fg-mute); }
  .kv-table .v { color: var(--fg); word-break: break-all; }
  .model-list {
    display: grid; gap: 8px;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  }
  .model-card {
    background: var(--bg-3); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .model-card.active { border-color: #2f6db1; }
  .model-card .name {
    font-family: var(--mono); font-size: 13px; word-break: break-all;
  }
  .badge {
    display: inline-block; font-size: 11px;
    padding: 1px 6px; border-radius: 999px;
    background: var(--bg-3); color: var(--fg-dim);
    border: 1px solid var(--border);
  }
  .badge.status-loaded   { background: #11321b; color: #6dd590; border-color: #2a6234; }
  .badge.status-loading  { background: #2c2611; color: #e6c963; border-color: #5a4a14; }
  .badge.status-unloaded { background: var(--bg-3); color: var(--fg-mute); }
  .badge.status-sleeping { background: #1d2a3d; color: #8eb0d6; border-color: #2f4969; }
  .badge.status-failed   { background: #3a1216; color: #ff9a93; border-color: #5e2329; }
  .args-block {
    background: #0a0d12; border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 8px;
    font-family: var(--mono); font-size: 11.5px; color: var(--fg-dim);
    overflow: auto; white-space: pre-wrap; word-break: break-all;
    max-height: 200px;
  }
  .row-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .row-actions button { font-size: 11px; padding: 2px 8px; }
  /* modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: #000a;
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal {
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px 18px; min-width: 280px;
    max-width: 480px; box-shadow: 0 10px 40px #000c;
    display: flex; flex-direction: column; gap: 10px;
  }
  .modal h3 { margin: 0; font-size: 14px; }
  .modal .body { color: var(--fg-dim); font-size: 13px; line-height: 1.5; }
  .modal .body code { color: var(--fg); }
  .modal .actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal .actions button.primary { background: #1f4a7a; border-color: #2f6db1; color: #cfe3ff; }
  .modal .warn { color: var(--warn); font-size: 12px; }
  /* log panel */
  .log-card { gap: 6px; }
  .log-toolbar {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .log-toolbar input[type="search"] { min-width: 160px; flex: 1; }
  .log-view {
    background: #07090c; border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px;
    font-family: var(--mono); font-size: 12px; line-height: 1.45;
    color: #c5d2dd;
    max-height: 50vh; overflow: auto;
    white-space: pre-wrap; word-break: break-all;
  }
  .log-view .ln { display: block; }
  .log-view .ln.hidden { display: none; }
  .ansi-30 { color: #6b7785; } .ansi-31 { color: #f85149; }
  .ansi-32 { color: #3fb950; } .ansi-33 { color: #d29922; }
  .ansi-34 { color: #58a6ff; } .ansi-35 { color: #d29df0; }
  .ansi-36 { color: #56d4dd; } .ansi-37 { color: #c5d2dd; }
  .ansi-90 { color: #6e7681; } .ansi-91 { color: #ff7b72; }
  .ansi-92 { color: #56d364; } .ansi-93 { color: #e3b341; }
  .ansi-94 { color: #79c0ff; } .ansi-95 { color: #d2a8ff; }
  .ansi-96 { color: #76e3ea; } .ansi-97 { color: #f0f6fc; }
  .ansi-bold { font-weight: 600; }
  .info-btn {
    cursor: pointer; color: var(--fg-mute); background: transparent;
    border: none; padding: 0 4px; font-size: 13px;
  }
  .info-btn:hover { color: var(--fg); }
  /* guidance */
  .guidance-list {
    display: flex; flex-direction: column; gap: 8px;
  }
  .suggestion {
    border: 1px solid var(--border);
    background: var(--bg-3);
    border-radius: 8px;
    padding: 8px 10px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .suggestion .head {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600;
  }
  .suggestion .body {
    font-size: 12px; color: var(--fg-dim); line-height: 1.5;
  }
  .suggestion .body strong { color: var(--fg); }
  .suggestion.severity-info { border-color: #2f4969; }
  .suggestion.severity-warn { border-color: #5a4a14; background: #1f1d10; }
  .suggestion.severity-bad  { border-color: #5e2329; background: #1f1112; }
  .sev-badge {
    font-size: 10px; padding: 1px 6px; border-radius: 999px;
    background: var(--bg-2); color: var(--fg-dim); border: 1px solid var(--border);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .sev-badge.info { color: #79c0ff; border-color: #2f4969; }
  .sev-badge.warn { color: #e3b341; border-color: #5a4a14; }
  .sev-badge.bad  { color: #ff7b72; border-color: #5e2329; }
  /* a11y / focus */
  :focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: 4px;
  }
  /* footer */
  footer.app {
    padding: 14px; color: var(--fg-mute); font-size: 12px;
    text-align: center; border-top: 1px solid var(--border);
    margin-top: 10px;
  }
  footer.app a { color: var(--accent); text-decoration: none; }
  footer.app a:hover { text-decoration: underline; }
  /* header last-update */
  header.app .last-update {
    color: var(--fg-mute); font-size: 11px; font-family: var(--mono);
  }
  /* very narrow mobile */
  @media (max-width: 360px) {
    header.app .brand { font-size: 13px; }
    header.app .server { display: none; }
    main { padding: 8px; gap: 8px; }
    .card { padding: 10px; }
    .card .value { font-size: 20px; }
  }
  /* honor user reduced-motion preference */
  @media (prefers-reduced-motion: reduce) {
    .led, .pct-bar > span { transition: none; }
  }
  /* responsive */
  @media (max-width: 480px) {
    header.app { padding: 8px 10px; gap: 8px; }
    header.app .server { max-width: 160px; font-size: 12px; }
    main { padding: 10px; gap: 10px; }
    .card .value { font-size: 22px; }
  }
</style>
</head>
<body>

<header class="app">
  <span class="brand">zero<span class="dot">·</span>llama</span>
  <span id="status-led" class="led" aria-hidden="true"></span>
  <span id="status-text" class="status-pill" role="status" aria-live="polite" data-i18n="header.status.connecting">…</span>
  <span id="last-update" class="last-update" aria-live="polite"></span>
  <span class="grow"></span>
  <span id="server-display" class="server" title=""></span>
  <select id="lang-select" aria-label="Language" title="Language">
    <option value="en">EN</option>
    <option value="ko">한국어</option>
    <option value="ja">日本語</option>
    <option value="zh-CN">中文</option>
    <option value="es">Español</option>
  </select>
</header>

<div id="banners"></div>

<main id="root">
  <div class="empty-hint" data-i18n="boot.preparing">Preparing…</div>
</main>

<footer class="app">
  <span data-i18n="footer.attribution">Inspired by abhiFSD/llama.cpp-Monitor-Dashboard (MIT)</span>
  &nbsp;·&nbsp;
  <a href="https://github.com/jungrok5/zerollama-dashboard" target="_blank" rel="noopener">GitHub</a>
</footer>

/* Resolve a key for the active language, fallback to English. */
function t(key, vars) {
  const dict = I18N[state.lang] || {};
  let s = dict[key];
  if (s === undefined) s = I18N.en[key];
  if (s === undefined) s = key;
  if (vars) {
    s = s.replace(/\{(\w+)\}/g, (m, k) => (vars[k] !== undefined ? String(vars[k]) : m));
  }
  return s;
}

/* ──────────────────────────────────────────────────────────────────────
 *  URL parameter parser. All settings live here — no localStorage.
 * ──────────────────────────────────────────────────────────────────── */
function parseParams() {
  const u = new URL(window.location.href);
  const q = u.searchParams;
  return {
    server: (q.get("server") || "").trim(),
    model:  (q.get("model")  || "").trim(),
    poll:   clampInt(q.get("poll"), 1000, 200, 60_000),
    log:    q.has("log") ? q.get("log") : null,   /* null = auto-detect */
    lang:   (q.get("lang") || "").trim(),
  };
}
function clampInt(s, fallback, min, max) {
  const n = parseInt(s, 10);
  if (!Number.isFinite(n)) return fallback;
  return Math.max(min, Math.min(max, n));
}

/* Pick a UI language from ?lang, then navigator.language, then 'en'. */
function pickLang(requested) {
  const supported = Object.keys(I18N);
  if (requested && supported.includes(requested)) return requested;
  const nav = (navigator.language || "en").toLowerCase();
  if (nav.startsWith("ko")) return "ko";
  if (nav.startsWith("ja")) return "ja";
  if (nav.startsWith("zh")) return "zh-CN";
  if (nav.startsWith("es")) return "es";
  return "en";
}

/* ──────────────────────────────────────────────────────────────────────
 *  Global state. One object, no hidden globals.
 * ──────────────────────────────────────────────────────────────────── */
const params = parseParams();
const state = {
  params,
  lang: pickLang(params.lang),
  serverBase: deriveServerBase(params.server),
  /* set in later phases */
  mode: null,           /* "single" | "router" */
  selectedModel: params.model || null,
  props: null,
  models: [],
  loraAdapters: [],
  metrics: null,
  slots: [],
  history: { metrics: [], slots: [] }, /* time series buffers */
  paused: false,
  pollers: [],          /* {name, abort, timer} */
  errors: [],           /* visible error banners */
  lastUpdate: null,
  ui: {
    bootDone: false,
    logEnabled: false,
  },
};

function deriveServerBase(raw) {
  if (!raw) return window.location.origin;
  try {
    const url = new URL(raw, window.location.href);
    return url.origin + (url.pathname.replace(/\/+$/, ""));
  } catch (_e) {
    /* report at boot time, fall back to current origin */
    return window.location.origin;
  }
}

/* ──────────────────────────────────────────────────────────────────────
 *  Tiny DOM helpers
 * ──────────────────────────────────────────────────────────────────── */
function $(sel, root) { return (root || document).querySelector(sel); }
function $$(sel, root) { return Array.from((root || document).querySelectorAll(sel)); }
function el(tag, attrs, children) {
  const node = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    if (k === "class") node.className = attrs[k];
    else if (k === "style") node.style.cssText = attrs[k];
    else if (k.startsWith("on") && typeof attrs[k] === "function") {
      node.addEventListener(k.slice(2), attrs[k]);
    } else if (k === "data") {
      for (const dk in attrs.data) node.dataset[dk] = attrs.data[dk];
    } else if (attrs[k] !== undefined && attrs[k] !== null) {
      node.setAttribute(k, attrs[k]);
    }
  }
  if (children !== undefined) {
    if (Array.isArray(children)) {
      for (const c of children) {
        if (c == null) continue;
        node.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
      }
    } else if (typeof children === "string") {
      node.textContent = children;
    } else {
      node.appendChild(children);
    }
  }
  return node;
}

/* Render every element with data-i18n="key" using the current language. */
function applyI18n(root) {
  const scope = root || document;
  scope.querySelectorAll("[data-i18n]").forEach((n) => {
    n.textContent = t(n.dataset.i18n);
  });
}

/* ──────────────────────────────────────────────────────────────────────
 *  Header wiring
 * ──────────────────────────────────────────────────────────────────── */
function initHeader() {
  $("#server-display").textContent = state.serverBase;
  $("#server-display").title = state.serverBase;
  const sel = $("#lang-select");
  sel.value = state.lang;
  sel.addEventListener("change", () => {
    const u = new URL(window.location.href);
    u.searchParams.set("lang", sel.value);
    window.location.href = u.toString();
  });
  document.documentElement.lang = state.lang;
  applyI18n();
}

/* Status LED: 'connecting' | 'online' | 'warn' | 'offline' | 'error' */
function setStatus(state_, textKey) {
  const led = $("#status-led");
  const txt = $("#status-text");
  led.classList.remove("on", "warn", "bad");
  if (state_ === "online")  led.classList.add("on");
  if (state_ === "warn")    led.classList.add("warn");
  if (state_ === "offline") led.classList.add("bad");
  if (state_ === "error")   led.classList.add("bad");
  txt.dataset.i18n = textKey;
  txt.textContent = t(textKey);
}

/* Push / clear an error banner. id de-duplicates. */
function showBanner(id, message, severity) {
  const wrap = $("#banners");
  let n = wrap.querySelector('[data-id="' + cssEscape(id) + '"]');
  if (!n) {
    n = el("div", { class: "banner" + (severity === "warn" ? " warn" : ""), data: { id } });
    wrap.appendChild(n);
  } else {
    n.className = "banner" + (severity === "warn" ? " warn" : "");
  }
  n.textContent = message;
}
function clearBanner(id) {
  const wrap = $("#banners");
  const n = wrap.querySelector('[data-id="' + cssEscape(id) + '"]');
  if (n) n.remove();
}
function cssEscape(s) { return String(s).replace(/[^\w-]/g, "_"); }

/* ──────────────────────────────────────────────────────────────────────
 *  Networking — every fetch is wrapped, surfaces an error if it fails,
 *  and is abortable so we can cancel in flight when the page unloads
 *  or the model selection changes.
 * ──────────────────────────────────────────────────────────────────── */
function endpoint(path, withModel) {
  const base = state.serverBase.replace(/\/+$/, "");
  let url = base + path;
  if (withModel && state.mode === "router" && state.selectedModel) {
    const sep = url.includes("?") ? "&" : "?";
    url += sep + "model=" + encodeURIComponent(state.selectedModel);
  }
  return url;
}

async function fetchJSON(path, opts) {
  return fetchEndpoint(path, opts, "json");
}
async function fetchText(path, opts) {
  return fetchEndpoint(path, opts, "text");
}
async function fetchEndpoint(path, opts, kind) {
  const o = opts || {};
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), o.timeout || 8000);
  try {
    const res = await fetch(endpoint(path, o.withModel !== false), {
      method: o.method || "GET",
      headers: Object.assign(
        { "Accept": kind === "json" ? "application/json" : "text/plain" },
        o.headers || {}
      ),
      body: o.body,
      signal: o.signal || ctrl.signal,
      cache: "no-store",
    });
    clearTimeout(timer);
    if (!res.ok) {
      const errBody = await safeReadBody(res);
      const e = new Error("HTTP " + res.status + (errBody ? " — " + errBody.slice(0, 200) : ""));
      e.status = res.status;
      e.body = errBody;
      throw e;
    }
    if (kind === "json") return await res.json();
    if (kind === "text") return await res.text();
    return res;
  } catch (e) {
    clearTimeout(timer);
    if (e.name === "AbortError") {
      const ae = new Error("aborted"); ae.aborted = true; throw ae;
    }
    throw e;
  }
}
async function safeReadBody(res) {
  try { return await res.text(); } catch (_) { return ""; }
}

/* ──────────────────────────────────────────────────────────────────────
 *  Polling engine. setTimeout chain with backoff + AbortController.
 *  Never setInterval — that allows requests to stack when the server
 *  is slow.
 * ──────────────────────────────────────────────────────────────────── */
function startPoller(name, intervalMs, taskFn) {
  let timer = null;
  let aborter = null;
  let stopped = false;
  let backoff = 0;       /* extra ms added on consecutive failures */
  const MAX_BACKOFF = 10_000;

  async function tick() {
    if (stopped) return;
    if (state.paused) {
      timer = setTimeout(tick, intervalMs);
      return;
    }
    aborter = new AbortController();
    try {
      await taskFn(aborter.signal);
      backoff = 0;
      clearBanner("poll-" + name);
    } catch (e) {
      if (e.aborted || e.name === "AbortError") {
        /* swallowed */
      } else {
        backoff = Math.min(MAX_BACKOFF, Math.max(1000, backoff ? backoff * 2 : 1000));
        showBanner(
          "poll-" + name,
          name + ": " + (e.message || t("error.fetch_failed")),
          "warn"
        );
      }
    }
    if (!stopped) timer = setTimeout(tick, intervalMs + backoff);
  }

  const handle = {
    name,
    stop() {
      stopped = true;
      if (timer) clearTimeout(timer);
      if (aborter) try { aborter.abort(); } catch (_) {}
    },
  };
  state.pollers.push(handle);
  /* fire first tick on next microtask to avoid stacking inside boot() */
  Promise.resolve().then(tick);
  return handle;
}

function stopAllPollers() {
  for (const p of state.pollers) p.stop();
  state.pollers = [];
}

/* Pause / resume hook for keyboard shortcut (Phase 9). */
function setPaused(v) {
  state.paused = !!v;
  setStatus(state.paused ? "warn" : (state.lastUpdate ? "online" : "connecting"),
            state.paused ? "common.pause" : "header.status.online");
}

/* When the tab is hidden, abort in-flight requests and pause —
 * resume on visibility. Cheap battery / server-load saver. */
document.addEventListener("visibilitychange", () => {
  if (document.hidden) setPaused(true);
  else setPaused(false);
});

/* ──────────────────────────────────────────────────────────────────────
 *  Boot sequence. Discovers single-model vs router mode, picks the
 *  active model in router mode, and hands control to the poller setup
 *  function (defined in later phases). Phase 2 only verifies wiring.
 * ──────────────────────────────────────────────────────────────────── */
async function boot() {
  initHeader();
  ensureRootScaffold();
  setStatus("connecting", "header.status.connecting");

  if (state.params.server && state.serverBase === window.location.origin
      && state.params.server !== window.location.origin) {
    /* deriveServerBase fell back; show the user. */
    showBanner("bad-url", t("error.bad_url") + ": " + state.params.server, "warn");
  }

  try {
    /* /health is the cheapest probe and works even when no model is loaded */
    await fetchJSON("/health", { withModel: false, timeout: 4000 });
  } catch (e) {
    setStatus("offline", "header.status.offline");
    showBanner("boot-health", t("error.fetch_failed") + ": /health — " + e.message, "warn");
    /* Continue anyway — some setups disable /health, and we still want
     * to attempt /props so the user sees what's reachable. */
  }

  /* /props is required — we use it to drive the rest of the UI */
  let props = null;
  try {
    props = await fetchJSON("/props", { withModel: false, timeout: 6000 });
    state.props = props;
    clearBanner("boot-props");
  } catch (e) {
    setStatus("error", "header.status.error");
    showBanner("boot-props", "/props — " + e.message);
  }

  /* /v1/models — universal across modes. May be empty in router mode
   * before any model is loaded. */
  try {
    const v1 = await fetchJSON("/v1/models", { withModel: false, timeout: 6000 });
    state.v1models = (v1 && Array.isArray(v1.data)) ? v1.data : [];
  } catch (e) {
    state.v1models = [];
    /* not fatal */
  }

  /* Router-mode detection: GET /models. If it returns 200 with a list of
   * objects whose status has a 'value' field, this is router mode.
   * 404 / not-array / wrong shape → single mode. */
  state.mode = "single";
  state.models = [];
  try {
    const m = await fetchJSON("/models", { withModel: false, timeout: 6000 });
    /* router payload shape: { data: [...] } or just an array, depending on build */
    const list = Array.isArray(m) ? m
                 : (m && Array.isArray(m.data) ? m.data
                 : (m && Array.isArray(m.models) ? m.models : null));
    if (list && list.length && typeof list[0] === "object"
        && list[0] && list[0].status && typeof list[0].status === "object"
        && "value" in list[0].status) {
      state.mode = "router";
      state.models = list;
    }
  } catch (_e) { /* not router */ }

  /* If router and no explicit ?model=, pick the first loaded model, else
   * the first listed model. */
  if (state.mode === "router") {
    if (!state.selectedModel) {
      const loaded = state.models.find((x) => x.status && x.status.value === "loaded");
      const first  = state.models[0];
      state.selectedModel = (loaded && loaded.id) || (first && first.id) || null;
    }
  } else {
    state.selectedModel = null;
  }

  state.ui.bootDone = true;
  state.lastUpdate = Date.now();
  /* Don't lie: only show "online" if /props came back. Otherwise leave
   * whichever error/offline state was set above so the LED matches the
   * banner. */
  if (state.props) setStatus("online", "header.status.online");

  renderBootSummary();
  renderGuidance();
  startCorePollers();
  startSecondaryPollers();
  /* fire-and-forget log detection — never blocks the dashboard */
  startLogPoller().catch(() => {});
}

/* Bare minimum scaffold so later phases have stable mount points to
 * write into. Each phase adds detail to one of these slots. */
function ensureRootScaffold() {
  const root = $("#root");
  root.innerHTML = "";
  root.appendChild(el("div", { id: "metrics-section", class: "full",
                               style: "display: contents;" }));
  root.appendChild(el("div", { id: "slots-section", class: "full",
                               style: "display: contents;" }));
  root.appendChild(el("div", { id: "models-section", class: "full",
                               style: "display: contents;" }));
  root.appendChild(el("div", { id: "config-section", class: "full",
                               style: "display: contents;" }));
  root.appendChild(el("div", { id: "lora-section", class: "full",
                               style: "display: contents;" }));
  root.appendChild(el("div", { id: "log-section", class: "full",
                               style: "display: contents;" }));
  root.appendChild(el("div", { id: "guidance-section", class: "full",
                               style: "display: contents;" }));
}

/* Render Models, Server config, and LoRA cards. Re-callable; on each call
 * we rebuild the section content. Cheap because it's not on the hot path. */
function renderBootSummary() {
  renderModelsCard();
  renderServerConfigCard();
  renderLoraCard();
}

function findV1Meta(modelId) {
  if (!Array.isArray(state.v1models)) return null;
  return state.v1models.find((m) => m && (m.id === modelId)) || null;
}

function renderModelsCard() {
  const sec = $("#models-section");
  sec.innerHTML = "";
  const card = el("div", { class: "card full" }, [
    el("h2", null, t("models.title")),
  ]);
  sec.appendChild(card);

  if (state.mode === "router") {
    /* selector + per-model cards */
    const sel = el("select", { id: "model-selector",
                               style: "max-width: 100%; min-width: 200px;",
                               onchange: () => onModelSelect($("#model-selector").value) });
    sel.appendChild(el("option", { value: "" }, "— " + t("models.selector") + " —"));
    for (const m of state.models) {
      sel.appendChild(el("option", {
        value: m.id,
        selected: m.id === state.selectedModel ? "selected" : null,
      }, m.id));
    }
    card.appendChild(el("div", { class: "row-actions" }, [
      el("span", { class: "sub" }, t("models.selector") + ":"),
      sel,
    ]));

    if (state.models.length === 0) {
      card.appendChild(el("div", { class: "sub" }, t("models.no_models")));
    } else {
      const list = el("div", { class: "model-list" });
      for (const m of state.models) list.appendChild(routerModelCard(m));
      card.appendChild(list);
    }
  } else {
    /* single-model: show the active model's metadata */
    const id = (state.v1models[0] && state.v1models[0].id)
            || (state.props && state.props.model_path)
            || "model";
    const meta = findV1Meta(id) || state.v1models[0] || null;
    card.appendChild(singleModelCard(id, meta));
  }
}

function routerModelCard(m) {
  const status = (m.status && m.status.value) || "unknown";
  const isActive = m.id === state.selectedModel;
  const meta = findV1Meta(m.id);
  const node = el("div", { class: "model-card" + (isActive ? " active" : "") }, [
    el("div", { class: "name" }, m.id),
    el("div", { class: "row-actions" }, [
      el("span", { class: "badge status-" + status }, t("models.status." + status)
        || t("models.status.unknown")),
      m.in_cache ? el("span", { class: "badge" }, t("models.cached")) : null,
      (m.status && m.status.failed && m.status.exit_code !== undefined && m.status.exit_code !== null)
        ? el("span", { class: "badge status-failed" },
            t("models.exit_code") + " " + m.status.exit_code)
        : null,
    ].filter(Boolean)),
    m.path ? el("div", { class: "sub" },
      el("span", { class: "badge" }, t("model.path")) )
      : null,
    m.path ? el("div", { class: "sub", style: "word-break: break-all;" }, m.path) : null,
  ]);
  if (meta && meta.meta) {
    node.appendChild(metaKVTable(meta.meta));
  }
  if (m.status && Array.isArray(m.status.args) && m.status.args.length) {
    const argsTxt = m.status.args.join(" ");
    const block = el("div", { class: "args-block" }, argsTxt);
    node.appendChild(block);
    node.appendChild(el("div", { class: "row-actions" }, [
      el("button", {
        onclick: (e) => copyToClipboard(argsTxt, e.currentTarget),
      }, t("common.copy")),
    ]));
  }
  /* load / unload buttons */
  const actions = el("div", { class: "row-actions" }, []);
  if (status === "loaded" || status === "sleeping") {
    actions.appendChild(el("button", {
      onclick: () => confirmAction(
        t("models.confirm.unload", { name: m.id }),
        () => callLoadOrUnload("/models/unload", m.id, "unload")
      ),
    }, t("models.actions.unload")));
  } else {
    actions.appendChild(el("button", {
      onclick: () => confirmAction(
        t("models.confirm.load", { name: m.id }),
        () => callLoadOrUnload("/models/load", m.id, "load")
      ),
    }, t("models.actions.load")));
  }
  node.appendChild(actions);
  return node;
}

function singleModelCard(id, meta) {
  const props = state.props || {};
  const card = el("div", { class: "model-card" }, [
    el("div", { class: "name" }, id),
    el("div", { class: "row-actions" }, [
      props.is_sleeping
        ? el("span", { class: "badge status-sleeping" }, t("models.status.sleeping"))
        : el("span", { class: "badge status-loaded" }, t("models.status.loaded")),
    ]),
  ]);
  if (props.model_path) {
    card.appendChild(el("div", { class: "kv-table" }, [
      el("div", { class: "k" }, t("model.path")),
      el("div", { class: "v" }, props.model_path),
    ]));
  }
  if (meta && meta.meta) card.appendChild(metaKVTable(meta.meta));
  return card;
}

function metaKVTable(meta) {
  const rows = [];
  function row(labelKey, val) {
    rows.push(el("div", { class: "k" }, t(labelKey)));
    rows.push(el("div", { class: "v" }, val == null ? "—" : String(val)));
  }
  if (meta.n_vocab !== undefined)      row("model.n_vocab",     meta.n_vocab);
  if (meta.n_ctx_train !== undefined)  row("model.n_ctx_train", meta.n_ctx_train);
  if (meta.n_embd !== undefined)       row("model.n_embd",      meta.n_embd);
  if (meta.n_params !== undefined)     row("model.n_params",    fmtNumber(meta.n_params));
  if (meta.size !== undefined)         row("model.size",        fmtBytes(meta.size));
  return el("div", { class: "kv-table" }, rows);
}

function fmtBytes(n) {
  if (!isFinite(n) || n == null) return "—";
  if (n >= 1024 * 1024 * 1024) return (n / (1024 * 1024 * 1024)).toFixed(2) + " GB";
  if (n >= 1024 * 1024) return (n / (1024 * 1024)).toFixed(2) + " MB";
  if (n >= 1024) return (n / 1024).toFixed(1) + " KB";
  return n + " B";
}

/* ──────────────────────────────────────────────────────────────────────
 *  Router: switching active model. Updates URL (?model=) so the view
 *  is shareable, restarts pollers so subsequent GETs use the new model,
 *  and re-renders the model section.
 * ──────────────────────────────────────────────────────────────────── */
function onModelSelect(id) {
  state.selectedModel = id || null;
  const u = new URL(window.location.href);
  if (id) u.searchParams.set("model", id);
  else u.searchParams.delete("model");
  window.history.replaceState({}, "", u.toString());
  resetHistories();

/* ──────────────────────────────────────────────────────────────────────
 *  Modal / confirmation.
 *  We never call window.confirm so we can show formatted body and avoid
 *  the browser-native dialog blocking the event loop.
 * ──────────────────────────────────────────────────────────────────── */
function showModal({ title, bodyNode, okLabel, onOk, mutating }) {
  const back = el("div", { class: "modal-backdrop", role: "dialog", "aria-modal": "true" });
  let onKey;
  const close = () => {
    back.remove();
    if (onKey) document.removeEventListener("keydown", onKey);
  };
  const ok = el("button", { class: "primary", onclick: async () => {
    ok.disabled = true;
    try { await onOk(); } finally { close(); }
  }}, okLabel || t("common.confirm"));
  const cancel = el("button", { onclick: close }, t("common.cancel"));
  /* mutating modals get a "this changes server state" warning; informational
   * modals (like the log help dialog) skip it. */
  const warnNode = mutating
    ? el("div", { class: "warn" }, "⚠ " + t(state.mode === "router"
        ? "modal.warn_router" : "modal.warn_server"))
    : null;
  const m = el("div", { class: "modal" }, [
    el("h3", null, title),
    el("div", { class: "body" }, bodyNode),
    warnNode,
    el("div", { class: "actions" }, [cancel, ok]),
  ].filter(Boolean));
  back.appendChild(m);
  back.addEventListener("click", (e) => { if (e.target === back) close(); });
  document.body.appendChild(back);
  /* Esc closes — listen on document so focus position doesn't matter */
  onKey = (e) => { if (e.key === "Escape") close(); };
  document.addEventListener("keydown", onKey);
  ok.focus();
}

function confirmAction(message, onOk) {
  showModal({
    title: t("common.confirm"),
    bodyNode: el("div", null, message),
    mutating: true,
    onOk,
  });
}

async function copyToClipboard(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
    if (btn) {
      const old = btn.textContent;
      btn.textContent = t("common.copied");
      setTimeout(() => { btn.textContent = old; }, 1200);
    }
  } catch (e) {
    showBanner("clipboard", e.message || "clipboard error", "warn");
  }
}

async function callLoadOrUnload(path, modelId, kind) {
  try {
    await fetchJSON(path, {
      method: "POST",
      withModel: false,
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: modelId }),
      timeout: 60_000,
    });
    /* refresh /models so status updates */
    refreshRouterModels();
  } catch (e) {
    showBanner("post-" + kind, kind + ": " + e.message);
  }
}

async function refreshRouterModels() {
  if (state.mode !== "router") return;
  try {
    const m = await fetchJSON("/models", { withModel: false, timeout: 6000 });
    const list = Array.isArray(m) ? m : (m && Array.isArray(m.data) ? m.data
                : (m && Array.isArray(m.models) ? m.models : []));
    state.models = list;
    renderModelsCard();
    renderServerConfigCard();
    bumpGuidance();
  } catch (e) {
    showBanner("models-refresh", "/models: " + e.message, "warn");
  }
}

/* ──────────────────────────────────────────────────────────────────────
 *  Guidance engine (Phase 7)
 *
 *  Each rule inspects the current state and either returns null or a
 *  {id, severity, title, explain, suggest, context} object. The Active
 *  suggestions panel collects every triggered rule once per render.
 *
 *  Rules that need "sustained" behaviour (kv cache > 0.9 for 30s, etc.)
 *  use sustained() which tracks an "above-threshold since" timestamp
 *  per rule id.
 * ──────────────────────────────────────────────────────────────────── */
const sustainedSince = Object.create(null);
function sustained(id, condition, seconds) {
  const now = Date.now();
  if (condition) {
    if (!sustainedSince[id]) sustainedSince[id] = now;
    return (now - sustainedSince[id]) >= seconds * 1000;
  }
  delete sustainedSince[id];
  return false;
}

const RULES = [
  /* --- aggregate metrics --- */
  function ruleBusySlots(s) {
    /* n_busy_slots_per_decode is the running average of how many slots
     * were busy during each llama_decode() call. Compared to total_slots
     * this tells us if the server is running near saturation. */
    const v = s.metrics && s.metrics["llamacpp:n_busy_slots_per_decode"];
    const total = s.props && s.props.total_slots;
    if (v == null || !total) return null;
    const ratio = v / total;
    if (sustained("busy_slots_high", ratio >= 0.9, 30)) {
      return rule("busy_slots_high", "warn",
        { value: v.toFixed(2) + " / " + total });
    }
    return null;
  },
  function ruleDeferred(s) {
    const v = s.metrics && s.metrics["llamacpp:requests_deferred"];
    if (v == null) return null;
    if (sustained("deferred", v > 0, 5)) {
      return rule("deferred", v >= 5 ? "bad" : "warn", { value: String(v) });
    }
    return null;
  },
  function ruleIdleSlow(s) {
    const tps = s.metrics && s.metrics["llamacpp:predicted_tokens_seconds"];
    const proc = s.metrics && s.metrics["llamacpp:requests_processing"];
    /* "slow" is relative — we say <5 tok/s with at least one slot busy */
    if (tps != null && proc >= 1 && tps < 5 && tps > 0) {
      if (sustained("idle_slow", true, 10)) {
        return rule("idle_slow", "warn", { value: tps.toFixed(2) + " tok/s" });
      }
    } else { sustained("idle_slow", false, 10); }
    return null;
  },
  /* --- props-derived --- */
  function ruleSleeping(s) {
    if (s.props && s.props.is_sleeping) {
      return rule("sleeping", "info", { value: t("common.yes") });
    }
    return null;
  },
  /* --- per-slot sampler hints — emit once per slot, dedup later --- */
  function ruleSamplerHints(s) {
    const out = [];
    for (const sl of s.slots) {
      if (!sl.is_processing) continue;
      const p = sl.params || {};
      if (p.temperature === 0) {
        out.push(rule("temp_zero", "info", { value: "slot " + sl.id }));
      } else if (typeof p.temperature === "number" && p.temperature > 1.5) {
        out.push(rule("temp_high", "warn",
          { value: "slot " + sl.id + " — " + p.temperature.toFixed(2) }));
      }
      if (typeof p.repeat_penalty === "number" && p.repeat_penalty > 1.3) {
        out.push(rule("repeat_high", "warn",
          { value: "slot " + sl.id + " — " + p.repeat_penalty.toFixed(2) }));
      }
      if (p.mirostat && p.mirostat !== 0) {
        out.push(rule("mirostat", "info", { value: "slot " + sl.id }));
      }
      if (typeof p.dry_multiplier === "number" && p.dry_multiplier > 0) {
        out.push(rule("dry", "info", { value: "slot " + sl.id }));
      }
    }
    /* dedup by rule id — a single suggestion stands in for all slots */
    const seen = new Set(); const uniq = [];
    for (const r of out) {
      if (seen.has(r.id)) continue;
      seen.add(r.id); uniq.push(r);
    }
    return uniq.length ? uniq : null;
  },
  /* --- LoRA --- */
  function ruleLoraScale(s) {
    const out = [];
    for (const a of (s.loraAdapters || [])) {
      if (typeof a.scale === "number" && a.scale > 1) {
        out.push(rule("lora_scale", "warn",
          { value: "id " + a.id + " — " + a.scale.toFixed(2) }));
        break;
      }
    }
    return out.length ? out : null;
  },
  /* --- router status --- */
  function ruleFailedModels(s) {
    if (s.mode !== "router") return null;
    const failed = (s.models || []).filter((m) => m.status && m.status.value === "failed");
    if (!failed.length) return null;
    const ec = failed[0].status && failed[0].status.exit_code;
    return rule("failed_model", "bad",
      { value: failed.length + " — " + failed[0].id + (ec != null ? " (exit " + ec + ")" : "") });
  },
  function ruleLoadingLong(s) {
    if (s.mode !== "router") return null;
    const loading = (s.models || []).find((m) => m.status && m.status.value === "loading");
    if (sustained("loading_long", !!loading, 60)) {
      return rule("loading_long", "warn", { value: loading.id });
    }
    return null;
  },
];

function rule(id, severity, ctx) {
  return {
    id,
    severity,
    title:   t("rule." + id + ".title"),
    explain: t("rule." + id + ".explain"),
    suggest: t("rule." + id + ".suggest"),
    context: ctx || null,
  };
}

function evaluateGuidance() {
  const out = [];
  for (const fn of RULES) {
    let r;
    try { r = fn(state); } catch (_e) { continue; }
    if (!r) continue;
    if (Array.isArray(r)) out.push.apply(out, r);
    else out.push(r);
  }
  return out;
}

function renderGuidance() {
  const sec = $("#guidance-section");
  if (!sec) return;
  if (sec.dataset.built !== "1") {
    sec.dataset.built = "1";
    sec.innerHTML = "";
    sec.appendChild(el("div", { class: "card full" }, [
      el("h2", null, t("guidance.title")),
      el("div", { class: "guidance-list", id: "guidance-list" }),
    ]));
  }
  const list = $("#guidance-list");
  const suggestions = evaluateGuidance();
  list.innerHTML = "";
  if (!suggestions.length) {
    list.appendChild(el("div", { class: "sub" }, t("guidance.empty")));
    return;
  }
  for (const s of suggestions) {
    const item = el("div", { class: "suggestion severity-" + s.severity }, [
      el("div", { class: "head" }, [
        el("span", { class: "sev-badge " + s.severity },
          t("guidance.severity." + s.severity)),
        el("span", null, s.title),
        s.context && s.context.value
          ? el("span", { class: "sub" }, "— " + s.context.value)
          : null,
      ].filter(Boolean)),
      el("div", { class: "body" }, [
        el("div", null, s.explain),
        el("div", { style: "margin-top: 4px;" }, [
          el("strong", null, "→ "),
          s.suggest,
        ]),
      ]),
    ]);
    list.appendChild(item);
  }
}

/* Re-evaluate guidance whenever the data that feeds it changes. */
function bumpGuidance() {
  /* Throttle so a fast metrics poll doesn't spam re-render. */
  if (bumpGuidance._t) return;
  bumpGuidance._t = setTimeout(() => {
    bumpGuidance._t = null;
    renderGuidance();
  }, 250);
}

/* ──────────────────────────────────────────────────────────────────────
 *  Log tail (Phase 6)
 *
 *  Mechanism: HTTP Range against a static file. The dashboard cannot
 *  read local files, so this only works when:
 *    1. llama-server's stdout is redirected to a file
 *       (e.g. `... > ./public/server.log 2>&1`)
 *    2. that file is served from the same origin
 *    3. the HTTP server supports Range (cpp-httplib + nginx do)
 *  If HEAD on the path fails (404, CORS, etc.) the panel is hidden.
 * ──────────────────────────────────────────────────────────────────── */
const LOG_TAIL_BYTES = 65536;
const LOG_MAX_LINES = 2000;
const logState = {
  url: null,
  enabled: false,
  totalSize: 0,
  lastModified: null,
  lines: [],
  follow: true,
  filter: "",
};

function logUrl() {
  /* honor explicit ?log=, default to ./server.log relative to the
   * current page (NOT the API server — that wouldn't be reachable). */
  const p = state.params.log;
  if (p === "") return null;       /* explicitly disabled */
  const path = (p == null || p === undefined) ? "server.log" : p;
  try {
    return new URL(path, window.location.href).toString();
  } catch (_e) { return null; }
}

async function detectLog() {
  const url = logUrl();
  if (!url) { logState.enabled = false; return false; }
  try {
    const res = await fetch(url, { method: "HEAD", cache: "no-store" });
    if (!res.ok) return false;
    /* Accept-Ranges: bytes is what makes tail possible. Fall back to
     * "total bytes < tail size" if the header is missing — at least we
     * can show the whole file. */
    const accepts = (res.headers.get("Accept-Ranges") || "").toLowerCase();
    const size = parseInt(res.headers.get("Content-Length") || "0", 10);
    if (accepts.indexOf("bytes") === -1 && (!size || size > LOG_TAIL_BYTES * 4)) {
      return false;
    }
    logState.url = url;
    logState.enabled = true;
    logState.totalSize = isFinite(size) ? size : 0;
    return true;
  } catch (_e) { return false; }
}

async function fetchLogTail() {
  if (!logState.enabled || !logState.url) return null;
  const headers = { "Cache-Control": "no-cache" };
  /* Negative Range: read the last N bytes (no need to track size). */
  headers["Range"] = "bytes=-" + LOG_TAIL_BYTES;
  const res = await fetch(logState.url, { headers, cache: "no-store" });
  if (!res.ok && res.status !== 206) {
    throw new Error("HTTP " + res.status);
  }
  const lm = res.headers.get("Last-Modified");
  if (lm && lm === logState.lastModified) return null;       /* unchanged */
  logState.lastModified = lm;
  return await res.text();
}

/* Minimal ANSI SGR renderer — color/bold codes only, anything else
 * is dropped. Returns a fragment of <span>s. */
function ansiToFragment(line) {
  const frag = document.createDocumentFragment();
  const parts = line.split(/\x1b\[([\d;]*)m/);
  /* parts: [text, code, text, code, text, ...] */
  let activeClasses = [];
  for (let i = 0; i < parts.length; i++) {
    if (i % 2 === 0) {
      if (!parts[i]) continue;
      if (activeClasses.length === 0) {
        frag.appendChild(document.createTextNode(parts[i]));
      } else {
        const span = document.createElement("span");
        span.className = activeClasses.join(" ");
        span.textContent = parts[i];
        frag.appendChild(span);
      }
    } else {
      const code = parts[i];
      if (code === "" || code === "0") {
        activeClasses = [];
        continue;
      }
      const codes = code.split(";").map((s) => parseInt(s, 10));
      for (const c of codes) {
        if (c === 0) activeClasses = [];
        else if (c === 1) activeClasses.push("ansi-bold");
        else if ((c >= 30 && c <= 37) || (c >= 90 && c <= 97)) {
          activeClasses = activeClasses.filter((cl) => !cl.match(/^ansi-\d/));
          activeClasses.push("ansi-" + c);
        }
      }
    }
  }
  return frag;
}

function renderLogLines(replace) {
  const view = $("#log-view");
  if (!view) return;
  if (replace) view.innerHTML = "";
  const filter = logState.filter.toLowerCase();
  const start = replace ? 0 : view.childNodes.length;
  for (let i = start; i < logState.lines.length; i++) {
    const line = logState.lines[i];
    const ln = el("span", { class: "ln" });
    ln.appendChild(ansiToFragment(line));
    if (filter && line.toLowerCase().indexOf(filter) === -1) {
      ln.classList.add("hidden");
    }
    view.appendChild(ln);
  }
  if (logState.follow) view.scrollTop = view.scrollHeight;
}

function applyLogPayload(text) {
  if (text == null) return;
  /* The first line returned by a negative Range is likely truncated — drop it. */
  const lines = text.split(/\r?\n/);
  if (lines.length > 1) lines.shift();
  /* trailing empty line from "...\n" */
  while (lines.length && lines[lines.length - 1] === "") lines.pop();
  logState.lines = lines.slice(-LOG_MAX_LINES);
  renderLogLines(true);
}

function ensureLogSection() {
  const sec = $("#log-section");
  if (sec.dataset.built === "1") return;
  sec.dataset.built = "1";
  sec.innerHTML = "";
  if (!logState.enabled) return;
  const card = el("div", { class: "card full log-card" }, [
    el("h2", null, [
      t("log.title") + " ",
      el("button", { class: "info-btn", title: t("log.setup_help_title"),
                     onclick: () => showLogHelp() }, "ⓘ"),
    ]),
    el("div", { class: "log-toolbar" }, [
      el("label", null, [
        el("input", { type: "checkbox", id: "log-follow", checked: "checked",
                      onchange: () => { logState.follow = $("#log-follow").checked; }}),
        " " + t("log.follow"),
      ]),
      el("input", { type: "search", placeholder: t("log.search"),
                    oninput: (e) => { logState.filter = e.target.value; renderLogLines(true); }}),
      el("span", { class: "sub", id: "log-status" }, ""),
    ]),
    el("div", { class: "log-view", id: "log-view",
                onscroll: (e) => {
                  /* user scrolled away from bottom → stop autoscrolling */
                  const v = e.target;
                  const atBottom = (v.scrollTop + v.clientHeight + 4) >= v.scrollHeight;
                  if (!atBottom && logState.follow) {
                    logState.follow = false;
                    const cb = $("#log-follow"); if (cb) cb.checked = false;
                  }
                }}, t("log.empty")),
  ]);
  sec.appendChild(card);
}

function showLogHelp() {
  showModal({
    title: t("log.setup_help_title"),
    bodyNode: el("div", null, t("log.setup_help")),
    okLabel: t("common.close"),
    onOk: () => {},
  });
}

async function startLogPoller() {
  const ok = await detectLog();
  if (!ok) {
    logState.enabled = false;
    return;
  }
  ensureLogSection();
  /* immediate first fetch */
  try {
    const txt = await fetchLogTail();
    if (txt != null) applyLogPayload(txt);
  } catch (e) {
    showBanner("log-init", "log: " + e.message, "warn");
  }
  startPoller("log", 5000, async () => {
    const txt = await fetchLogTail();
    if (txt != null) applyLogPayload(txt);
  });
}

/* Periodic refresh of router /models and /lora-adapters */
function startSecondaryPollers() {
  if (state.mode === "router") {
    startPoller("models-refresh", Math.max(state.params.poll * 5, 5000), async () => {
      await refreshRouterModels();
    });
  }
  startPoller("lora", Math.max(state.params.poll * 10, 10_000), async () => {
    try {
      const data = await fetchJSON("/lora-adapters", { withModel: true, timeout: 6000 });
      state.loraAdapters = Array.isArray(data) ? data : [];
      renderLoraCard();
      bumpGuidance();
    } catch (e) {
      if (e.status === 404) { state.loraAdapters = []; renderLoraCard(); return; }
      throw e;
    }
  });
  startPoller("props-refresh", 15_000, async () => {
    try {
      const p = await fetchJSON("/props", { withModel: true, timeout: 6000 });
      state.props = p;
      renderModelsCard();
      renderServerConfigCard();
      bumpGuidance();
    } catch (_e) { /* non-fatal */ }
  });
}

/* ──────────────────────────────────────────────────────────────────────
 *  Prometheus text parser. We only need plain numeric metrics — no
 *  histograms or labelled series — so a minimal regex parser is fine.
 *  Lines look like:    metric_name{label="x"} 42.0
 *  We strip comments, ignore label sets, and keep the last value seen.
 * ──────────────────────────────────────────────────────────────────── */
function parsePrometheus(text) {
  const out = {};
  const lines = text.split(/\r?\n/);
  for (const raw of lines) {
    const line = raw.trim();
    if (!line || line.startsWith("#")) continue;
    /* metric name = up to first '{' or whitespace */
    const m = line.match(/^([A-Za-z_:][\w:]*)(\{[^}]*\})?\s+(-?[\d.eE+\-]+|NaN|\+?Inf|-Inf)/);
    if (!m) continue;
    const name = m[1];
    const v = m[3];
    let n;
    if (v === "NaN") n = NaN;
    else if (v === "+Inf" || v === "Inf") n = Infinity;
    else if (v === "-Inf") n = -Infinity;
    else n = parseFloat(v);
    out[name] = n;
  }
  return out;
}

/* ──────────────────────────────────────────────────────────────────────
 *  Time series buffers — fixed-length ring of {t, v} samples per metric.
 *  60 s window at 1 s sampling = ~60 points. Enough for a sparkline.
 * ──────────────────────────────────────────────────────────────────── */
const HISTORY_SECONDS = 60;
const histories = Object.create(null);
function pushHistory(key, v) {
  let h = histories[key];
  if (!h) h = histories[key] = [];
  const now = Date.now();
  h.push({ t: now, v });
  const cutoff = now - HISTORY_SECONDS * 1000;
  while (h.length && h[0].t < cutoff) h.shift();
  return h;
}
function resetHistories() {
  for (const k in histories) delete histories[k];
}

/* ──────────────────────────────────────────────────────────────────────
 *  SVG sparkline. No external deps. Returns an <svg> node.
 *  - data: array of {t, v}
 *  - opts: { min, max, height }
 * ──────────────────────────────────────────────────────────────────── */
function sparkline(data, opts) {
  const W = 200, H = (opts && opts.height) || 36;
  const pad = 1;
  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("viewBox", "0 0 " + W + " " + H);
  svg.setAttribute("preserveAspectRatio", "none");
  if (!data || data.length < 2) {
    /* render an empty axis so the layout doesn't jump */
    const g = document.createElementNS("http://www.w3.org/2000/svg", "line");
    g.setAttribute("x1", 0); g.setAttribute("x2", W);
    g.setAttribute("y1", H - pad); g.setAttribute("y2", H - pad);
    g.setAttribute("class", "spark-grid");
    svg.appendChild(g);
    return svg;
  }
  /* x scale = real time so gaps/holes show as gaps */
  const t0 = data[0].t, t1 = data[data.length - 1].t;
  const span = Math.max(1, t1 - t0);
  let vMin = (opts && opts.min !== undefined) ? opts.min : Infinity;
  let vMax = (opts && opts.max !== undefined) ? opts.max : -Infinity;
  if (opts && opts.min === undefined) for (const p of data) if (p.v < vMin) vMin = p.v;
  if (opts && opts.max === undefined) for (const p of data) if (p.v > vMax) vMax = p.v;
  if (!isFinite(vMin)) vMin = 0;
  if (!isFinite(vMax)) vMax = 1;
  if (vMax - vMin < 1e-9) { vMax = vMin + 1; }
  const sx = (t) => ((t - t0) / span) * W;
  const sy = (v) => H - pad - ((v - vMin) / (vMax - vMin)) * (H - 2 * pad);
  const points = data.map((p) => sx(p.t).toFixed(1) + "," + sy(p.v).toFixed(1)).join(" ");
  /* baseline rule */
  const base = document.createElementNS("http://www.w3.org/2000/svg", "line");
  base.setAttribute("x1", 0); base.setAttribute("x2", W);
  base.setAttribute("y1", H - pad); base.setAttribute("y2", H - pad);
  base.setAttribute("class", "spark-grid");
  svg.appendChild(base);
  /* filled area */
  const area = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
  area.setAttribute("points",
    "0," + (H - pad) + " " + points + " " + W + "," + (H - pad));
  area.setAttribute("class", "spark-area");
  svg.appendChild(area);
  /* line */
  const line = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
  line.setAttribute("points", points);
  line.setAttribute("class", "spark-line");
  svg.appendChild(line);
  return svg;
}

/* ──────────────────────────────────────────────────────────────────────
 *  Metrics rendering. We build a fixed set of cards once, then update
 *  values + sparkline in place to avoid layout jitter.
 *
 *  Metrics emitted by current llama.cpp master (/metrics endpoint):
 *    counter: prompt_tokens_total, prompt_seconds_total,
 *             tokens_predicted_total, tokens_predicted_seconds_total,
 *             n_decode_total, n_tokens_max, n_busy_slots_per_decode
 *    gauge:   prompt_tokens_seconds, predicted_tokens_seconds,
 *             requests_processing, requests_deferred
 *
 *  kv_cache_usage_ratio and kv_cache_tokens were removed upstream — we
 *  derive nothing from them here.
 * ──────────────────────────────────────────────────────────────────── */
const METRIC_CARDS = [
  { id: "predicted_tps", titleKey: "metrics.gen_tps",
    metric: "llamacpp:predicted_tokens_seconds", unit: "tok/s", min: 0 },
  { id: "prompt_tps",    titleKey: "metrics.prompt_tps",
    metric: "llamacpp:prompt_tokens_seconds",    unit: "tok/s", min: 0 },
  { id: "processing",    titleKey: "metrics.processing",
    metric: "llamacpp:requests_processing",      unit: "",      min: 0 },
  { id: "deferred",      titleKey: "metrics.deferred",
    metric: "llamacpp:requests_deferred",        unit: "",      min: 0,
    warnAt: 1, badAt: 5 },
  { id: "busy_slots",    titleKey: "metrics.busy_slots",
    metric: "llamacpp:n_busy_slots_per_decode",  unit: "",      min: 0 },
  { id: "n_tokens_max",  titleKey: "metrics.n_tokens_max",
    metric: "llamacpp:n_tokens_max",             unit: "tok",   min: 0 },
  { id: "prompt_total",  titleKey: "metrics.prompt_total",
    metric: "llamacpp:prompt_tokens_total",      unit: "tok",   min: 0, cumulative: true },
  { id: "predicted_total", titleKey: "metrics.predicted_total",
    metric: "llamacpp:tokens_predicted_total",   unit: "tok",   min: 0, cumulative: true },
  { id: "decode_total", titleKey: "metrics.decode_total",
    metric: "llamacpp:n_decode_total",           unit: "",      min: 0, cumulative: true },
  { id: "prompt_seconds_total", titleKey: "metrics.prompt_seconds_total",
    metric: "llamacpp:prompt_seconds_total",     unit: "s",     min: 0, cumulative: true },
  { id: "predicted_seconds_total", titleKey: "metrics.predicted_seconds_total",
    metric: "llamacpp:tokens_predicted_seconds_total", unit: "s", min: 0, cumulative: true },
];

function fmtNumber(n, opts) {
  if (n === undefined || n === null || !isFinite(n)) return "—";
  const o = opts || {};
  if (o.percent) return (n * 100).toFixed(n < 0.1 ? 2 : 1);
  if (n >= 1e9) return (n / 1e9).toFixed(2) + "G";
  if (n >= 1e6) return (n / 1e6).toFixed(2) + "M";
  if (n >= 1e3) return (n / 1e3).toFixed(2) + "k";
  if (Number.isInteger(n)) return String(n);
  if (n >= 100) return n.toFixed(0);
  if (n >= 10)  return n.toFixed(1);
  return n.toFixed(2);
}

function ensureMetricCards() {
  const sec = $("#metrics-section");
  if (sec.dataset.built === "1") return;
  sec.dataset.built = "1";
  sec.innerHTML = "";
  for (const c of METRIC_CARDS) {
    const card = el("div", { class: "card metric-card", id: "metric-" + c.id }, [
      el("h2", null, t(c.titleKey)),
      el("div", { class: "row" }, [
        el("div", { class: "value", id: "metric-" + c.id + "-value" }, "—"),
        el("div", { class: "unit" }, c.unit || ""),
      ]),
      c.percent
        ? el("div", { class: "pct-bar", id: "metric-" + c.id + "-bar" },
            el("span", { style: "width: 0%" }))
        : null,
      el("div", { class: "spark", id: "metric-" + c.id + "-spark" }),
    ]);
    sec.appendChild(card);
  }
}

function renderMetricsDisabled() {
  ensureMetricCards();
  for (const c of METRIC_CARDS) {
    const card = $("#metric-" + c.id);
    if (!card) continue;
    card.classList.add("disabled");
    $("#metric-" + c.id + "-value").textContent = "—";
    $("#metric-" + c.id + "-spark").innerHTML = "";
  }
  showBanner("metrics-disabled", t("error.metrics_disabled"), "warn");
}

function renderMetrics(parsed) {
  ensureMetricCards();
  clearBanner("metrics-disabled");
  for (const c of METRIC_CARDS) {
    const v = parsed[c.metric];
    pushHistory(c.id, isFinite(v) ? v : 0);

    const card = $("#metric-" + c.id);
    card.classList.remove("warn", "bad", "disabled");
    if (c.warnAt !== undefined && v >= c.warnAt) card.classList.add("warn");
    if (c.badAt  !== undefined && v >= c.badAt)  { card.classList.remove("warn"); card.classList.add("bad"); }

    $("#metric-" + c.id + "-value").textContent =
      fmtNumber(v, { percent: c.percent });

    if (c.percent) {
      const bar = $("#metric-" + c.id + "-bar");
      const span = bar.querySelector("span");
      const pct = Math.max(0, Math.min(100, (v || 0) * 100));
      span.style.width = pct.toFixed(1) + "%";
      bar.classList.remove("warn", "bad");
      if (c.warnAt !== undefined && v >= c.warnAt) bar.classList.add("warn");
      if (c.badAt  !== undefined && v >= c.badAt)  { bar.classList.remove("warn"); bar.classList.add("bad"); }
    }

    const sparkHost = $("#metric-" + c.id + "-spark");
    sparkHost.innerHTML = "";
    sparkHost.appendChild(sparkline(histories[c.id], {
      min: c.min !== undefined ? c.min : undefined,
      max: c.max !== undefined ? c.max : undefined,
    }));
  }
  state.metrics = parsed;
  state.lastUpdate = Date.now();
  bumpGuidance();
}

/* ──────────────────────────────────────────────────────────────────────
 *  Slots — per-slot card with sampling parameters expander.
 *  Slot object shape (subset we use):
 *    id, id_task, n_ctx, is_processing, next_token { n_decoded, n_remain }
 *    params: { temperature, top_k, top_p, min_p, repeat_penalty,
 *              presence_penalty, frequency_penalty, mirostat,
 *              mirostat_tau, mirostat_eta, dry_multiplier, dry_base,
 *              dry_allowed_length, samplers, seed, n_predict, lora, ... }
 * ──────────────────────────────────────────────────────────────────── */

/* Sampling-parameter keys we surface in the expander, in display order. */
const SAMPLER_KEYS = [
  "temperature", "dynatemp_range", "dynatemp_exponent",
  "top_k", "top_p", "min_p", "typical_p",
  "xtc_probability", "xtc_threshold",
  "repeat_last_n", "repeat_penalty",
  "presence_penalty", "frequency_penalty",
  "dry_multiplier", "dry_base", "dry_allowed_length", "dry_penalty_last_n",
  "mirostat", "mirostat_tau", "mirostat_eta",
  "n_predict", "n_keep", "n_discard", "max_tokens",
  "ignore_eos", "stream", "n_probs", "min_keep",
  "samplers", "seed", "lora",
  "speculative.n_max", "speculative.n_min", "speculative.p_min",
];

function getDeep(obj, path) {
  const parts = path.split(".");
  let cur = obj;
  for (const p of parts) {
    if (cur == null) return undefined;
    cur = cur[p];
  }
  return cur;
}

function fmtParam(v) {
  if (v === undefined || v === null) return "—";
  if (typeof v === "number") {
    if (Number.isInteger(v)) return String(v);
    return v.toFixed(3).replace(/\.?0+$/, "") || "0";
  }
  if (typeof v === "boolean") return v ? t("common.yes") : t("common.no");
  if (Array.isArray(v)) return v.length === 0 ? t("common.empty") : v.map(fmtParam).join(", ");
  if (typeof v === "object") {
    try { return JSON.stringify(v); } catch (_) { return String(v); }
  }
  return String(v);
}

function ensureSlotsSection() {
  const sec = $("#slots-section");
  if (sec.dataset.built === "1") return;
  sec.dataset.built = "1";
  sec.innerHTML = "";
  sec.appendChild(el("div", { class: "card full" }, [
    el("h2", null, t("slots.title")),
    el("div", { class: "slot-grid", id: "slot-grid" }),
    el("div", { class: "sub", id: "slots-empty",
                style: "display: none;", "data-i18n": "slots.disabled" }, t("slots.disabled")),
  ]));
}

function renderSlotsDisabled() {
  ensureSlotsSection();
  $("#slot-grid").innerHTML = "";
  $("#slots-empty").style.display = "";
  $("#slots-empty").textContent = t("slots.disabled");
}

function renderSlots(slots) {
  ensureSlotsSection();
  $("#slots-empty").style.display = "none";
  const grid = $("#slot-grid");
  /* keyed update — keep DOM nodes per slot id, only patch what changed. */
  const seen = new Set();
  for (const s of slots) {
    seen.add(String(s.id));
    let node = grid.querySelector('[data-slot="' + s.id + '"]');
    if (!node) {
      node = makeSlotNode(s);
      grid.appendChild(node);
    }
    updateSlotNode(node, s);
  }
  /* drop nodes for slots that vanished (rare, but possible after reload) */
  $$('[data-slot]', grid).forEach((n) => {
    if (!seen.has(n.dataset.slot)) n.remove();
  });
  /* sort slots by id ascending so the layout is stable */
  const items = $$('[data-slot]', grid)
    .sort((a, b) => Number(a.dataset.slot) - Number(b.dataset.slot));
  for (const n of items) grid.appendChild(n);
  state.slots = slots;
  bumpGuidance();
}

function makeSlotNode(s) {
  const node = el("div", { class: "slot", data: { slot: String(s.id) } }, [
    el("div", { class: "slot-head" }, [
      el("span", { class: "id" }, "slot " + s.id),
      el("span", { class: "badge", "data-role": "state" }, t("slots.idle")),
    ]),
    el("div", { class: "progress", "data-role": "progress" }, [
      el("div", { class: "pct-bar" }, el("span", { style: "width: 0%" })),
      el("div", { "data-role": "ratio" }, "—"),
    ]),
    el("div", { class: "sub", "data-role": "ctx" }, "—"),
    el("div", { class: "slot-actions", "data-role": "actions" }, []),
    el("details", null, [
      el("summary", null, t("slots.show_params")),
      el("div", { class: "params", "data-role": "params" }, []),
    ]),
  ]);
  return node;
}

function updateSlotNode(node, s) {
  const isActive = !!s.is_processing;
  node.classList.toggle("active", isActive);
  node.classList.toggle("idle", !isActive);

  const stateBadge = node.querySelector('[data-role="state"]');
  stateBadge.textContent = isActive ? t("slots.active") : t("slots.idle");
  stateBadge.classList.toggle("active", isActive);

  const next = s.next_token || {};
  const nDecoded = num(next.n_decoded, 0);
  const nRemain  = num(next.n_remain, NaN);
  const nPredict = num((s.params || {}).n_predict, NaN);
  const total = isFinite(nPredict) && nPredict > 0
    ? nPredict
    : (isFinite(nDecoded + nRemain) ? nDecoded + Math.max(0, nRemain) : 0);

  const pctSpan = node.querySelector('.pct-bar > span');
  const pct = total > 0 ? Math.max(0, Math.min(100, (nDecoded / total) * 100)) : 0;
  pctSpan.style.width = pct.toFixed(1) + "%";
  node.querySelector('[data-role="ratio"]').textContent =
    isActive ? (nDecoded + " / " + (total || "?")) : "—";

  const ctx = node.querySelector('[data-role="ctx"]');
  ctx.textContent = t("slots.context_used") + ": " + (s.n_ctx || "?");

  /* params expander — re-render only when open or first time, since it's
   * cheap enough for ~30 keys. */
  const params = node.querySelector('[data-role="params"]');
  if (params) {
    params.innerHTML = "";
    const p = s.params || {};
    for (const k of SAMPLER_KEYS) {
      const v = getDeep(p, k);
      if (v === undefined) continue;
      params.appendChild(el("div", { class: "k" }, k));
      params.appendChild(el("div", { class: "v" }, fmtParam(v)));
    }
    /* show any keys we didn't enumerate, so nothing is hidden */
    for (const k in p) {
      if (SAMPLER_KEYS.includes(k)) continue;
      if (typeof p[k] === "object" && p[k] !== null && !Array.isArray(p[k])) {
        for (const sub in p[k]) {
          const fullKey = k + "." + sub;
          if (SAMPLER_KEYS.includes(fullKey)) continue;
          params.appendChild(el("div", { class: "k" }, fullKey));
          params.appendChild(el("div", { class: "v" }, fmtParam(p[k][sub])));
        }
      } else {
        params.appendChild(el("div", { class: "k" }, k));
        params.appendChild(el("div", { class: "v" }, fmtParam(p[k])));
      }
    }
  }

  /* slot KV actions placeholder — Phase 5 wires the POST handlers. */
  const actions = node.querySelector('[data-role="actions"]');
  if (actions && actions.dataset.built !== "1") {
    actions.dataset.built = "1";
    actions.appendChild(el("button", {
      onclick: () => slotAction(s.id, "save"),
    }, t("slots.actions.save")));
    actions.appendChild(el("button", {
      onclick: () => slotAction(s.id, "restore"),
    }, t("slots.actions.restore")));
    actions.appendChild(el("button", {
      onclick: () => slotAction(s.id, "erase"),
    }, t("slots.actions.erase")));
  }
}
function num(v, fb) { return (typeof v === "number" && isFinite(v)) ? v : fb; }

/* slotAction is defined in Phase 5 (confirm + POST). */

/* Boot wiring → metrics + slots pollers. */
function startCorePollers() {
  stopAllPollers();
  ensureMetricCards();
  ensureSlotsSection();

  startPoller("metrics", state.params.poll, async () => {
    try {
      const txt = await fetchText("/metrics", { withModel: true, timeout: 6000 });
      renderMetrics(parsePrometheus(txt));
    } catch (e) {
      if (e.status === 404 || e.status === 501) renderMetricsDisabled();
      else throw e;
    }
  });

  startPoller("slots", state.params.poll, async () => {
    try {
      const data = await fetchJSON("/slots", { withModel: true, timeout: 6000 });
      const arr = Array.isArray(data) ? data : (data && Array.isArray(data.slots) ? data.slots : []);
      renderSlots(arr);
    } catch (e) {
      if (e.status === 404 || e.status === 501) renderSlotsDisabled();
      else throw e;
    }
  });
}

/* ──────────────────────────────────────────────────────────────────────
 *  Polish (Phase 9): keyboard shortcuts, last-update ticker.
 * ──────────────────────────────────────────────────────────────────── */
document.addEventListener("keydown", (e) => {
  /* don't steal keys when the user is typing in an input/select/etc. */
  const tag = (e.target && e.target.tagName) || "";
  if (/^(INPUT|TEXTAREA|SELECT)$/.test(tag)) return;
  if (e.metaKey || e.ctrlKey || e.altKey) return;

  if (e.key === " " || e.code === "Space") {
    e.preventDefault();
    setPaused(!state.paused);
  } else if (e.key === "r" || e.key === "R") {
    resetHistories();
    /* repaint sparklines with empty data on next tick */
    if (state.metrics) renderMetrics(state.metrics);
  }
});

function tickLastUpdate() {
  const node = $("#last-update");
  if (!node) return;
  if (!state.lastUpdate) { node.textContent = ""; return; }
  const ageSec = Math.max(0, Math.round((Date.now() - state.lastUpdate) / 1000));
  node.textContent = t("header.last_update") + ": " + ageSec + "s";
}
setInterval(tickLastUpdate, 1000);
/* one allowed setInterval — read-only DOM update, no fetch involved,
 * so the "no setInterval for fetches" rule still holds. */

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", boot);
} else {
  /* parser already past DOMContentLoaded — schedule on the next tick so
   * any synchronous code below this point still runs first. */
  Promise.resolve().then(boot);
}
</script>
